<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MediChat-RD 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 420px; margin: auto; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="card login-card p-4">
    <div class="text-center mb-4">
        <h2>🧬 MediChat-RD</h2>
        <p class="text-muted">药企管理后台 · MVP Demo</p>
    </div>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">选择药企账户</label>
            <select name="company_id" class="form-select">
                {% for c in companies %}
                <option value="{{c.id}}">{{c.name}} ({{c.subscription_plan}})</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">登录后台</button>
    </form>
    <div class="mt-3 text-center text-muted small">
        越狱思维模式：药企付费，患者免费<br>
        Demo环境 · 无需密码
    </div>
</div>
</body>
</html>
