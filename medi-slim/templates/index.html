<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>MediSlim 轻健康 · 你的随身健康管家</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --c1:#07C160;--c1d:#06AD56;--c2:#576B95;
            --bg:#F7F7F7;--card:#FFF;--txt:#191919;--txt2:#999;
            --r:14px;--shadow:0 2px 12px rgba(0,0,0,.06)
        }
        body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;max-width:500px;margin:0 auto}
        
        /* Hero */
        .hero{background:linear-gradient(135deg,#07C160 0%,#06AD56 50%,#059B48 100%);padding:50px 20px 30px;color:#fff;text-align:center}
        .hero h1{font-size:28px;font-weight:800;letter-spacing:1px}
        .hero p{font-size:14px;opacity:.9;margin-top:8px}
        .hero .stats{display:flex;justify-content:center;gap:30px;margin-top:20px}
        .hero .stat{text-align:center}
        .hero .stat-num{font-size:24px;font-weight:800}
        .hero .stat-lbl{font-size:11px;opacity:.8}
        
        /* 产品卡 */
        .section{padding:20px}
        .section-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .product-list{display:flex;flex-direction:column;gap:12px}
        .product-card{background:var(--card);border-radius:var(--r);padding:20px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
        .product-card:active{transform:scale(.98)}
        .product-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
        .product-icon.hot{background:linear-gradient(135deg,#FF6B6B,#FF8E53)}
        .product-icon.hair{background:linear-gradient(135deg,#A18CD1,#FBC2EB)}
        .product-icon.skin{background:linear-gradient(135deg,#FFD89B,#19547B)}
        .product-icon.mens{background:linear-gradient(135deg,#667EEA,#764BA2)}
        .product-icon.sleep{background:linear-gradient(135deg,#2C3E50,#4CA1AF)}
        .product-info{flex:1}
        .product-info h3{font-size:16px;font-weight:600}
        .product-info p{font-size:13px;color:var(--txt2);margin-top:4px}
        .product-price{text-align:right;flex-shrink:0}
        .product-price .first{font-size:13px;color:var(--c1);font-weight:700}
        .product-price .renew{font-size:11px;color:var(--txt2);margin-top:2px}
        .product-badge{position:absolute;top:8px;right:8px;background:#FF3B30;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
        
        /* 信任标识 */
        .trust-bar{display:flex;gap:12px;padding:0 20px 20px;overflow-x:auto}
        .trust-item{background:var(--card);border-radius:12px;padding:12px 16px;font-size:12px;color:var(--txt2);white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.04);display:flex;align-items:center;gap:6px}
        
        /* 合作伙伴 */
        .partner-section{background:linear-gradient(135deg,#F0FFF4 0%,#EBF8FF 100%);border-radius:var(--r);padding:20px;margin:0 20px 20px}
        .partner-title{font-size:14px;font-weight:600;color:var(--c1);margin-bottom:12px}
        .partner-list{display:flex;flex-wrap:wrap;gap:8px}
        .partner-tag{background:#fff;border:1px solid #D1FAE5;border-radius:8px;padding:6px 12px;font-size:13px;color:#065F46}
        
        /* 模态框 */
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:20px}
        .modal.show{display:flex}
        .modal-content{background:var(--card);border-radius:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;padding:24px}
        .modal-close{float:right;font-size:24px;cursor:pointer;color:var(--txt2)}
        
        /* 评估表单 */
        .q-card{margin-bottom:20px}
        .q-num{font-size:12px;color:var(--c1);font-weight:600;margin-bottom:6px}
        .q-text{font-size:16px;font-weight:500;margin-bottom:12px;line-height:1.5}
        .q-options{display:flex;flex-wrap:wrap;gap:8px}
        .q-opt{padding:10px 16px;border:2px solid #E5E5E5;border-radius:12px;font-size:14px;cursor:pointer;transition:all .15s;background:#fff}
        .q-opt.sel{border-color:var(--c1);background:#F0FFF4;color:var(--c1)}
        .q-input{width:100%;padding:12px;border:2px solid #E5E5E5;border-radius:12px;font-size:16px;outline:none}
        .q-input:focus{border-color:var(--c1)}
        
        /* 进度 */
        .progress{height:4px;background:#E5E5E5;border-radius:2px;margin:16px 0}
        .progress-fill{height:100%;background:var(--c1);border-radius:2px;transition:width .3s}
        
        /* 按钮 */
        .btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;transition:all .15s}
        .btn-primary{background:var(--c1);color:#fff}
        .btn-primary:hover{background:var(--c1d)}
        .btn-primary:disabled{background:#ccc;cursor:not-allowed}
        .btn-outline{background:transparent;color:var(--c1);border:2px solid var(--c1);margin-top:10px}
        
        /* 结果页 */
        .result-header{text-align:center;padding:20px 0}
        .result-icon{font-size:56px}
        .result-title{font-size:22px;font-weight:700;margin:12px 0}
        .result-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:15px;font-weight:600}
        .badge-green{background:#D1FAE5;color:#065F46}
        .badge-yellow{background:#FEF3C7;color:#92400E}
        .badge-red{background:#FEE2E2;color:#991B1B}
        .result-stats{display:flex;justify-content:center;gap:24px;margin:20px 0}
        .result-stat{text-align:center}
        .result-stat .val{font-size:28px;font-weight:800;color:var(--c1)}
        .result-stat .lbl{font-size:12px;color:var(--txt2)}
        .result-detail{text-align:left;font-size:14px;line-height:2;background:#F9FAFB;border-radius:12px;padding:16px;margin:16px 0}
        .result-price{text-align:center;margin:20px 0}
        .result-price .price{font-size:36px;font-weight:800;color:var(--c1)}
        .result-price .unit{font-size:14px;color:var(--txt2)}
        
        /* 包含服务 */
        .includes{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
        .include-tag{background:#F0FFF4;color:#065F46;border:1px solid #D1FAE5;border-radius:8px;padding:6px 12px;font-size:12px}
        
        /* 底部 */
        .footer{text-align:center;padding:30px 20px;font-size:11px;color:var(--txt2);line-height:1.8}
        
        /* 动画 */
        .fade{animation:fadeUp .3s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>

<!-- Hero -->
<div class="hero">
    <h1>💊 MediSlim</h1>
    <p>AI驱动的消费医疗平台 · 专业 · 便捷 · 到家</p>
    <div class="stats">
        <div class="stat"><div class="stat-num">5</div><div class="stat-lbl">健康品类</div></div>
        <div class="stat"><div class="stat-num">3+</div><div class="stat-lbl">合作机构</div></div>
        <div class="stat"><div class="stat-num">24h</div><div class="stat-lbl">在线服务</div></div>
    </div>
</div>

<!-- 信任栏 -->
<div style="padding:16px 20px 0">
    <div class="trust-bar">
        <div class="trust-item">🔒 数据加密</div>
        <div class="trust-item">👨‍⚕️ 执业医师</div>
        <div class="trust-item">✅ 合规药房</div>
        <div class="trust-item">📦 保密配送</div>
        <div class="trust-item">💬 24h客服</div>
    </div>
</div>

<!-- 产品列表 -->
<div class="section">
    <div class="section-title">🛒 健康产品</div>
    <div class="product-list" id="product-list"></div>
</div>

<!-- 合作伙伴 -->
<div class="partner-section">
    <div class="partner-title">🏥 合作医疗机构</div>
    <div class="partner-list" id="partner-list"></div>
</div>

<!-- 底部 -->
<div class="footer">
    MediSlim 轻健康 · AI驱动消费医疗平台<br>
    合作机构持有互联网医院牌照 · 处方药需经医师审核<br>
    AI评估仅供参考，最终方案以医师判断为准
</div>

<!-- 评估模态框 -->
<div class="modal" id="modal-assess">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div id="assess-content"></div>
    </div>
</div>

<!-- 结果模态框 -->
<div class="modal" id="modal-result">
    <div class="modal-content">
        <span class="modal-close" onclick="closeResult()">&times;</span>
        <div id="result-content"></div>
    </div>
</div>

<!-- 下单模态框 -->
<div class="modal" id="modal-order">
    <div class="modal-content">
        <span class="modal-close" onclick="closeOrder()">&times;</span>
        <div id="order-content"></div>
    </div>
</div>

<script>
const API = location.origin;
let state = {products:{},user:null,questions:[],answers:{},currentQ:0,selectedProduct:null,result:null};

// 初始化
(async()=>{
    state.products = await fetch(`${API}/api/products`).then(r=>r.json());
    renderProducts();
    const hospitals = await fetch(`${API}/api/hospitals`).then(r=>r.json());
    document.getElementById('partner-list').innerHTML = hospitals.map(h=>
        `<div class="partner-tag">🏥 ${h.name}</div>`
    ).join('');
    // 注册用户
    state.user = await fetch(`${API}/api/user/register`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({phone:'wx_'+Date.now(),name:'微信用户'})
    }).then(r=>r.json());
})();

function renderProducts(){
    const icons = {glp1:'hot',hair:'hair',skin:'skin',mens:'mens',sleep:'sleep'};
    const items = Object.entries(state.products);
    document.getElementById('product-list').innerHTML = items.map(([id,p])=>`
        <div class="product-card" onclick="startAssess('${id}')">
            <div class="product-icon ${icons[id]||'hot'}">${p.emoji}</div>
            <div class="product-info">
                <h3>${p.name}</h3>
                <p>${p.description}</p>
            </div>
            <div class="product-price">
                <div class="first">¥${p.first_price}/首月</div>
                <div class="renew">续费¥${p.renew_price}/${p.unit}</div>
            </div>
        </div>
    `).join('');
}

// 开始评估
async function startAssess(pid){
    state.selectedProduct = pid;
    state.answers = {};
    state.currentQ = 0;
    const data = await fetch(`${API}/api/assessment/start`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({product_id:pid})
    }).then(r=>r.json());
    state.questions = data.questions;
    renderQuestion();
    document.getElementById('modal-assess').classList.add('show');
}

function renderQuestion(){
    const q = state.questions[state.currentQ];
    const prog = ((state.currentQ+1)/state.questions.length*100).toFixed(0);
    let inputHtml = '';
    if(q.type==='choice'){
        inputHtml = `<div class="q-options">${q.options.map(o=>
            `<div class="q-opt ${state.answers[q.id]===o?'sel':''}" onclick="pickOpt(${q.id},'${o}',this)">${o}</div>`
        ).join('')}</div>`;
    } else {
        inputHtml = `<input class="q-input" type="number" placeholder="请输入" value="${state.answers[q.id]||''}" oninput="state.answers[${q.id}]=this.value">`;
    }
    document.getElementById('assess-content').innerHTML = `
        <div class="fade">
            <h3 style="margin-bottom:16px">📋 ${state.products[state.selectedProduct]?.name||''} 评估</h3>
            <div class="progress"><div class="progress-fill" style="width:${prog}%"></div></div>
            <p style="font-size:13px;color:var(--txt2);margin-bottom:16px">第${state.currentQ+1}/${state.questions.length}题</p>
            <div class="q-card">
                <div class="q-num">Q${q.id}</div>
                <div class="q-text">${q.text}</div>
                ${inputHtml}
            </div>
            <button class="btn btn-primary" onclick="nextQ()">${state.currentQ<state.questions.length-1?'下一题 →':'提交评估 📤'}</button>
        </div>
    `;
}

function pickOpt(qid,val,el){
    state.answers[qid]=val;
    el.parentElement.querySelectorAll('.q-opt').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel');
}

function nextQ(){
    const q = state.questions[state.currentQ];
    if(!state.answers[q.id]){alert('请选择或填写答案');return;}
    if(state.currentQ < state.questions.length-1){
        state.currentQ++;
        renderQuestion();
    } else {
        submitAssess();
    }
}

async function submitAssess(){
    const data = await fetch(`${API}/api/assessment/analyze`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({product_id:state.selectedProduct,answers:state.answers})
    }).then(r=>r.json());
    state.result = data;
    document.getElementById('modal-assess').classList.remove('show');
    renderResult(data);
}

function renderResult(r){
    let html = '<div class="fade">';
    
    if(!r.eligible){
        html += `
            <div class="result-header">
                <div class="result-icon">⚠️</div>
                <div class="result-title">暂不适用</div>
                <span class="result-badge badge-red">${r.reason}</span>
            </div>
            <div class="result-detail">${r.recommendation||''}</div>
        `;
    } else {
        const badge = r.urgency==='high'?'badge-red':r.urgency==='medium'?'badge-yellow':'badge-green';
        const urgTxt = r.urgency==='high'?'建议尽快开始':r.urgency==='medium'?'推荐使用':'可尝试';
        html += `
            <div class="result-header">
                <div class="result-icon">${r.urgency==='high'?'🔥':r.urgency==='medium'?'✅':'💡'}</div>
                <div class="result-title">${r.product} 评估结果</div>
                <span class="result-badge ${badge}">${urgTxt}</span>
            </div>
        `;
        
        if(r.bmi){
            html += `<div class="result-stats">
                <div class="result-stat"><div class="val">${r.bmi}</div><div class="lbl">当前BMI</div></div>
                <div class="result-stat"><div class="val">${r.weight_to_lose}kg</div><div class="lbl">需减重</div></div>
                <div class="result-stat"><div class="val">${r.estimated_months}月</div><div class="lbl">预计周期</div></div>
            </div>`;
        } else if(r.severity){
            html += `<div class="result-stats">
                <div class="result-stat"><div class="val">${r.severity==='early'?'初期':r.severity==='moderate'?'中期':'晚期'}</div><div class="lbl">脱发阶段</div></div>
                <div class="result-stat"><div class="val">${r.estimated_months}月</div><div class="lbl">预计疗程</div></div>
            </div>`;
        } else {
            html += `<div class="result-stats">
                <div class="result-stat"><div class="val">${r.score||0}%</div><div class="lbl">症状评分</div></div>
                <div class="result-stat"><div class="val">${r.estimated_months}月</div><div class="lbl">预计疗程</div></div>
            </div>`;
        }
        
        html += `<div class="result-detail"><strong>推荐方案：</strong>${r.plan}</div>`;
        
        html += `<div style="margin:12px 0"><strong>包含服务：</strong></div>
            <div class="includes">${(r.includes||[]).map(i=>`<span class="include-tag">✅ ${i}</span>`).join('')}</div>`;
        
        html += `<div class="result-price">
            <div class="price">¥${r.first_month_price}</div>
            <div class="unit">首月体验价 · 续费¥${state.products[state.selectedProduct]?.renew_price||0}/月</div>
        </div>`;
        
        html += `<button class="btn btn-primary" onclick="openOrder()">💊 立即下单</button>
            <button class="btn btn-outline" onclick="closeResult()">重新评估</button>`;
    }
    
    html += '</div>';
    document.getElementById('result-content').innerHTML = html;
    document.getElementById('modal-result').classList.add('show');
}

// 下单
function openOrder(){
    document.getElementById('modal-result').classList.remove('show');
    const p = state.products[state.selectedProduct]||{};
    document.getElementById('order-content').innerHTML = `
        <div class="fade">
            <h3 style="margin-bottom:20px">📦 确认订单</h3>
            <div style="background:#F9FAFB;border-radius:12px;padding:16px;margin-bottom:20px">
                <div style="font-size:16px;font-weight:600">${p.emoji} ${p.name}</div>
                <div style="font-size:13px;color:var(--txt2);margin-top:8px">首月价格</div>
                <div style="font-size:32px;font-weight:800;color:var(--c1)">¥${p.first_price}</div>
                <div style="font-size:12px;color:var(--txt2)">续费¥${p.renew_price}/${p.unit}，随时可取消</div>
            </div>
            <input class="q-input" id="order-name" placeholder="收件人姓名" style="margin-bottom:12px">
            <input class="q-input" id="order-phone" placeholder="手机号" style="margin-bottom:12px">
            <input class="q-input" id="order-addr" placeholder="收货地址（药品将保密配送）" style="margin-bottom:20px">
            <button class="btn btn-primary" onclick="submitOrder()">确认并支付 ¥${p.first_price}</button>
            <p style="font-size:11px;color:var(--txt2);text-align:center;margin-top:12px">
                提交后将由执业医师审核处方<br>审核通过后药房48小时内发货
            </p>
        </div>
    `;
    document.getElementById('modal-order').classList.add('show');
}

async function submitOrder(){
    const name = document.getElementById('order-name').value;
    const phone = document.getElementById('order-phone').value;
    const addr = document.getElementById('order-addr').value;
    if(!name||!phone||!addr){alert('请填写完整信息');return;}
    
    const order = await fetch(`${API}/api/order/create`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            user_id:state.user.id,
            product_id:state.selectedProduct,
            assessment:state.result,
            name,phone,address:addr
        })
    }).then(r=>r.json());
    
    document.getElementById('order-content').innerHTML = `
        <div class="fade" style="text-align:center;padding:20px 0">
            <div style="font-size:56px">✅</div>
            <h3 style="margin:16px 0">下单成功！</h3>
            <p style="font-size:14px;color:var(--txt2)">订单号：${order.id}</p>
            <div style="background:#F0FFF4;border-radius:12px;padding:16px;margin:20px 0;text-align:left;font-size:14px;line-height:2">
                📋 订单状态：已支付 → 医师审核中<br>
                ⏱️ 预计审核：2小时内<br>
                📦 预计发货：审核通过后24小时<br>
                💬 客服微信：medislim-support
            </div>
            <button class="btn btn-primary" onclick="closeOrder()">返回首页</button>
        </div>
    `;
}

// 模态框控制
function closeModal(){document.getElementById('modal-assess').classList.remove('show')}
function closeResult(){document.getElementById('modal-result').classList.remove('show')}
function closeOrder(){document.getElementById('modal-order').classList.remove('show')}
</script>
</body>
</html>
